<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Team</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #1a002b, #000);
    color: white;
}

.header {
    background: #00bcd4;
    text-align: center;
    padding: 15px;
    font-weight: bold;
}

.title {
    text-align: center;
    margin: 25px 0 10px;
    font-size: 26px;
}

.subtitle {
    text-align: center;
    font-size: 16px;
    color: #ccc;
}

/* VIDEO BOX */
.video-box {
    margin: 20px;
    border: 2px solid cyan;
    border-radius: 20px;
    box-shadow: 0 0 20px purple;
    overflow: hidden;
    position: relative;
}

video {
    width: 100%;
}

/* SPEAKER BUTTON */
.sound-btn {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: limegreen;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;
    cursor: pointer;
    box-shadow: 0 0 15px lime;
}

/* CARD */
.card {
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    border: 2px solid #00e5ff;
    box-shadow: 0 0 25px purple;
}

.badge {
    padding: 10px 20px;
    border-radius: 25px;
    font-weight: bold;
    margin-right: 10px;
}

.new { background: red; }
.premium { background: linear-gradient(45deg, purple, blue); }

.app {
    display: flex;
    align-items: center;
    margin-top: 20px;
}

.app-logo {
    width: 70px;
    height: 70px;
    border-radius: 15px;
    object-fit: cover;
    margin-right: 15px;
    box-shadow: 0 0 10px purple;
}

.install {
    display: block;
    margin-top: 20px;
    padding: 15px;
    text-align: center;
    background: limegreen;
    border-radius: 50px;
    text-decoration: none;
    color: white;
    font-size: 20px;
    box-shadow: 0 0 20px lime;
}
</style>
</head>

<body>

<div class="header">Garena Free Fire Team</div>

<div class="title">WATCH FULL VIDEO</div>
<div class="subtitle">How to download 👇</div>

<!-- VIDEO -->
<div class="video-box">
    <video id="myVideo" autoplay muted playsinline>
        <source src="video.MP4" type="video/mp4">
    </video>

    <!-- SPEAKER BUTTON -->
    <div class="sound-btn" onclick="toggleSound()">🔇</div>
</div>

<!-- CARD -->
<div class="card">
    <span class="badge new">NEW</span>
    <span class="badge premium">PREMIUM</span>

    <div class="app">
        <img src="logo.png.webp" class="app-logo">
        <div>
            <h3>PROXY SERVER</h3>
            <p>FREE FIRE PROXY SERVER UNLIMITED ACCESS</p>
            ⭐⭐⭐⭐⭐
        </div>
    </div>

    <a href="https://tlytmm.qdmmv.site?key=tlytmm72" class="install">
        ⬇ Install
    </a>
</div>

<script>
function toggleSound() {
    let video = document.getElementById("myVideo");
    let btn = document.querySelector(".sound-btn");

    if (video.muted) {
        video.muted = false;
        video.play();
        btn.innerHTML = "🔊";
    } else {
        video.muted = true;
        btn.innerHTML = "🔇";
    }
}
</script>

</body>
</html>
